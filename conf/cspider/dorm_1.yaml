tables:
  - name: "Student"
    role: dim
    description: "student"
    columns:
      - name: "StuID"
        role: primary_key
        type: FLOAT
        description: "stuid"
        alias: ["stuid"]
        sync: false
      - name: "LName"
        role: dimension
        type: VARCHAR(255)
        description: "lname"
        alias: ["lname"]
        sync: true
      - name: "Fname"
        role: dimension
        type: VARCHAR(255)
        description: "fname"
        alias: ["fname"]
        sync: true
      - name: "Age"
        role: dimension
        type: FLOAT
        description: "age"
        alias: ["age"]
        sync: false
      - name: "Sex"
        role: dimension
        type: VARCHAR(255)
        description: "sex"
        alias: ["sex"]
        sync: false
      - name: "Major"
        role: dimension
        type: FLOAT
        description: "major"
        alias: ["major"]
        sync: false
      - name: "Advisor"
        role: dimension
        type: FLOAT
        description: "advisor"
        alias: ["advisor"]
        sync: false
      - name: "city_code"
        role: dimension
        type: VARCHAR(255)
        description: "city code"
        alias: ["city_code"]
        sync: true
  - name: "Dorm"
    role: dim
    description: "dorm"
    columns:
      - name: "dormid"
        role: primary_key
        type: FLOAT
        description: "dormid"
        alias: ["dormid"]
        sync: false
      - name: "dorm_name"
        role: dimension
        type: VARCHAR(255)
        description: "dorm name"
        alias: ["dorm_name"]
        sync: true
      - name: "student_capacity"
        role: dimension
        type: FLOAT
        description: "student capacity"
        alias: ["student_capacity"]
        sync: true
      - name: "gender"
        role: dimension
        type: VARCHAR(255)
        description: "gender"
        alias: ["gender"]
        sync: true
  - name: "Dorm_amenity"
    role: dim
    description: "dorm amenity"
    columns:
      - name: "amenid"
        role: primary_key
        type: FLOAT
        description: "amenid"
        alias: ["amenid"]
        sync: false
      - name: "amenity_name"
        role: dimension
        type: VARCHAR(255)
        description: "amenity name"
        alias: ["amenity_name"]
        sync: true
  - name: "Has_amenity"
    role: dim
    description: "has amenity"
    columns:
      - name: "dormid"
        role: primary_key
        type: FLOAT
        description: "dormid"
        alias: ["dormid"]
        sync: false
      - name: "amenid"
        role: primary_key
        type: FLOAT
        description: "amenid"
        alias: ["amenid"]
        sync: false
  - name: "Lives_in"
    role: dim
    description: "lives in"
    columns:
      - name: "stuid"
        role: primary_key
        type: FLOAT
        description: "stuid"
        alias: ["stuid"]
        sync: false
      - name: "dormid"
        role: primary_key
        type: FLOAT
        description: "dormid"
        alias: ["dormid"]
        sync: false
      - name: "room_number"
        role: measure
        type: FLOAT
        description: "room number"
        alias: ["room_number"]
        sync: false

metrics:
  - name: "lives_in_room_number"
    description: room number from lives_in
    relevant_columns:
      - Lives_in.room_number
    alias: [room_number]