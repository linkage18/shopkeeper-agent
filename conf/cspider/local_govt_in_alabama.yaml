tables:
  - name: "Services"
    role: dim
    description: "services"
    columns:
      - name: "Service_ID"
        role: foreign_key
        type: FLOAT
        description: "service id"
        alias: ["service_id"]
        sync: false
      - name: "Service_Type_Code"
        role: dimension
        type: VARCHAR(255)
        description: "service type code"
        alias: ["service_type_code"]
        sync: true
  - name: "Participants"
    role: dim
    description: "participants"
    columns:
      - name: "Participant_ID"
        role: foreign_key
        type: FLOAT
        description: "participant id"
        alias: ["participant_id"]
        sync: false
      - name: "Participant_Type_Code"
        role: dimension
        type: VARCHAR(255)
        description: "participant type code"
        alias: ["participant_type_code"]
        sync: true
      - name: "Participant_Details"
        role: dimension
        type: VARCHAR(255)
        description: "participant details"
        alias: ["participant_details"]
        sync: false
  - name: "Events"
    role: dim
    description: "events"
    columns:
      - name: "Event_ID"
        role: foreign_key
        type: FLOAT
        description: "event id"
        alias: ["event_id"]
        sync: false
      - name: "Service_ID"
        role: foreign_key
        type: FLOAT
        description: "service id"
        alias: ["service_id"]
        sync: false
      - name: "Event_Details"
        role: dimension
        type: VARCHAR(255)
        description: "event details"
        alias: ["event_details"]
        sync: false
  - name: "Participants_in_Events"
    role: dim
    description: "participants in events"
    columns:
      - name: "Event_ID"
        role: foreign_key
        type: FLOAT
        description: "event id"
        alias: ["event_id"]
        sync: false
      - name: "Participant_ID"
        role: foreign_key
        type: FLOAT
        description: "participant id"
        alias: ["participant_id"]
        sync: false