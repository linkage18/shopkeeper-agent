metrics:
  - name: "invoices_total"
    description: total from invoices
    relevant_columns:
      - invoices.total
    alias: [total]
  - name: "tracks_milliseconds"
    description: milliseconds from tracks
    relevant_columns:
      - tracks.milliseconds
    alias: [milliseconds]
  - name: "tracks_bytes"
    description: bytes from tracks
    relevant_columns:
      - tracks.bytes
    alias: [bytes]
  - name: "tracks_unit_price"
    description: unit price from tracks
    relevant_columns:
      - tracks.unit_price
    alias: [unit_price]
  - name: "invoice_lines_unit_price"
    description: unit price from invoice_lines
    relevant_columns:
      - invoice_lines.unit_price
    alias: [unit_price]
  - name: "invoice_lines_quantity"
    description: quantity from invoice_lines
    relevant_columns:
      - invoice_lines.quantity
    alias: [quantity]