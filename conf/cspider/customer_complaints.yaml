        alias: ["staff_id"]
        sync: false
      - name: "gender"
        role: dimension
        type: VARCHAR(255)
        description: "gender"
        alias: ["gender"]
        sync: true
      - name: "first_name"
        role: dimension
        type: VARCHAR(255)
        description: "first name"
        alias: ["first_name"]
        sync: true
      - name: "last_name"
        role: dimension
        type: VARCHAR(255)
        description: "last name"
        alias: ["last_name"]
        sync: true
      - name: "email_address"
        role: dimension
        type: VARCHAR(255)
        description: "email address"
        alias: ["email_address"]
        sync: false
      - name: "phone_number"
        role: dimension
        type: VARCHAR(255)
        description: "phone number"
        alias: ["phone_number"]
        sync: false
  - name: "Customers"
    role: dim
    description: "customers"
    columns:
      - name: "customer_id"
        role: foreign_key
        type: FLOAT
        description: "customer id"
        alias: ["customer_id"]
        sync: false
      - name: "customer_type_code"
        role: dimension
        type: VARCHAR(255)
        description: "customer type code"
        alias: ["customer_type_code"]
        sync: true
      - name: "address_line_1"
        role: dimension
        type: VARCHAR(255)
        description: "address line 1"
        alias: ["address_line_1"]
        sync: false
      - name: "address_line_2"
        role: dimension
        type: VARCHAR(255)
        description: "address line 2"
        alias: ["address_line_2"]
        sync: false
      - name: "town_city"
        role: dimension
        type: VARCHAR(255)
        description: "town city"
        alias: ["town_city"]
