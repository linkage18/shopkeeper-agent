        alias: ["product_name"]
        sync: true
      - name: "product_description"
        role: dimension
        type: VARCHAR(255)
        description: "product description"
        alias: ["product_description"]
        sync: false
      - name: "product_price"
        role: measure
        type: FLOAT
        description: "product price"
        alias: ["product_price"]
        sync: false
  - name: "Complaints"
    role: dim
    description: "complaints"
    columns:
      - name: "complaint_id"
        role: foreign_key
        type: FLOAT
        description: "complaint id"
        alias: ["complaint_id"]
        sync: false
      - name: "product_id"
        role: foreign_key
        type: FLOAT
        description: "product id"
        alias: ["product_id"]
        sync: false
      - name: "customer_id"
        role: foreign_key
        type: FLOAT
        description: "customer id"
        alias: ["customer_id"]
        sync: false
      - name: "complaint_outcome_code"
        role: dimension
        type: VARCHAR(255)
        description: "complaint outcome code"
        alias: ["complaint_outcome_code"]
        sync: true
      - name: "complaint_status_code"
        role: dimension
        type: VARCHAR(255)
        description: "complaint status code"
        alias: ["complaint_status_code"]
        sync: true
      - name: "complaint_type_code"
        role: dimension
        type: VARCHAR(255)
        description: "complaint type code"
        alias: ["complaint_type_code"]
        sync: true
      - name: "date_complaint_raised"
        role: dimension
        type: DATETIME
        description: "date complaint raised"
        alias: ["date_complaint_raised"]
        sync: false
      - name: "date_complaint_closed"
        role: dimension
        type: DATETIME
        description: "date complaint closed"
        alias: ["date_complaint_closed"]
        sync: false
      - name: "staff_id"
        role: foreign_key
        type: FLOAT
        description: "staff id"
        alias: ["staff_id"]
        sync: false

metrics:
  - name: "products_product_price"
    description: product price from products
    relevant_columns:
      - Products.product_price
    alias: [product_price]