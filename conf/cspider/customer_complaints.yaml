      - name: "state"
        role: dimension
        type: VARCHAR(255)
        description: "state"
        alias: ["state"]
        sync: true
      - name: "email_address"
        role: dimension
        type: VARCHAR(255)
        description: "email address"
        alias: ["email_address"]
        sync: false
      - name: "phone_number"
        role: dimension
        type: VARCHAR(255)
        description: "phone number"
        alias: ["phone_number"]
        sync: false
  - name: "Products"
    role: dim
    description: "products"
    columns:
      - name: "product_id"
        role: foreign_key
