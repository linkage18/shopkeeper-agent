metrics:
  - name: "invoices_invoice_number"
    description: invoice number from invoices
    relevant_columns:
      - Invoices.invoice_number
    alias: [invoice_number]
  - name: "products_unit_price"
    description: unit price from products
    relevant_columns:
      - Products.unit_price
    alias: [unit_price]
  - name: "financial_transactions_invoice_number"
    description: invoice number from financial_transactions
    relevant_columns:
      - Financial_Transactions.invoice_number
    alias: [invoice_number]
  - name: "financial_transactions_transaction_amount"
    description: transaction amount from financial_transactions
    relevant_columns:
      - Financial_Transactions.transaction_amount
    alias: [transaction_amount]
  - name: "invoice_line_items_invoice_number"
    description: invoice number from invoice_line_items
    relevant_columns:
      - Invoice_Line_Items.invoice_number
    alias: [invoice_number]
  - name: "invoice_line_items_product_price"
    description: product price from invoice_line_items
    relevant_columns:
      - Invoice_Line_Items.product_price
    alias: [product_price]
  - name: "invoice_line_items_derived_product_cost"
    description: derived product cost from invoice_line_items
    relevant_columns:
      - Invoice_Line_Items.derived_product_cost
    alias: [derived_product_cost]
  - name: "invoice_line_items_derived_total_cost"
    description: derived total cost from invoice_line_items
    relevant_columns:
      - Invoice_Line_Items.derived_total_cost
    alias: [derived_total_cost]