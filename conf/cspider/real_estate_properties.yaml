metrics:
  - name: "properties_room_count"
    description: room count from properties
    relevant_columns:
      - Properties.room_count
    alias: [room_count]
  - name: "properties_vendor_requested_price"
    description: vendor requested price from properties
    relevant_columns:
      - Properties.vendor_requested_price
    alias: [vendor_requested_price]
  - name: "properties_buyer_offered_price"
    description: buyer offered price from properties
    relevant_columns:
      - Properties.buyer_offered_price
    alias: [buyer_offered_price]
  - name: "properties_agreed_selling_price"
    description: agreed selling price from properties
    relevant_columns:
      - Properties.agreed_selling_price
    alias: [agreed_selling_price]