tables:
  - name: "Ref_Feature_Types"
    role: dim
    description: "ref feature types"
    columns:
      - name: "feature_type_code"
        role: dimension
        type: VARCHAR(255)
        description: "feature type code"
        alias: ["feature_type_code"]
        sync: true
      - name: "feature_type_name"
        role: dimension
        type: VARCHAR(255)
        description: "feature type name"
        alias: ["feature_type_name"]
        sync: true
  - name: "Ref_Property_Types"
    role: dim
    description: "ref property types"
    columns:
      - name: "property_type_code"
        role: dimension
        type: VARCHAR(255)
        description: "property type code"
        alias: ["property_type_code"]
        sync: true
      - name: "property_type_description"
        role: dimension
        type: VARCHAR(255)
        description: "property type description"
        alias: ["property_type_description"]
        sync: true
  - name: "Other_Available_Features"
    role: dim
    description: "other available features"
    columns:
      - name: "feature_id"
        role: foreign_key
        type: FLOAT
        description: "feature id"
        alias: ["feature_id"]
        sync: false
      - name: "feature_type_code"
        role: dimension
        type: VARCHAR(255)
        description: "feature type code"
        alias: ["feature_type_code"]
        sync: true
      - name: "feature_name"
        role: dimension
        type: VARCHAR(255)
        description: "feature name"
        alias: ["feature_name"]
        sync: true
      - name: "feature_description"
        role: dimension
        type: VARCHAR(255)
        description: "feature description"
        alias: ["feature_description"]
        sync: false
  - name: "Properties"
