tables:
  - name: "people"
    role: dim
    description: "people"
    columns:
      - name: "People_ID"
        role: foreign_key
        type: FLOAT
        description: "people id"
        alias: ["people_id"]
        sync: false
      - name: "Age"
        role: dimension
        type: FLOAT
        description: "age"
        alias: ["age"]
        sync: false
      - name: "Name"
        role: dimension
        type: VARCHAR(255)
        description: "name"
        alias: ["name"]
        sync: true
      - name: "Nationality"
        role: dimension
        type: VARCHAR(255)
        description: "nationality"
        alias: ["nationality"]
        sync: false
      - name: "Graduation_College"
        role: dimension
        type: VARCHAR(255)
        description: "graduation college"
        alias: ["graduation_college"]
        sync: false
  - name: "company"
    role: dim
    description: "company"
    columns:
      - name: "Company_ID"
        role: foreign_key
        type: FLOAT
        description: "company id"
        alias: ["company_id"]
        sync: true
      - name: "Name"
        role: dimension
        type: VARCHAR(255)
        description: "name"
        alias: ["name"]
        sync: true
      - name: "Headquarters"
        role: dimension
        type: VARCHAR(255)
        description: "headquarters"
        alias: ["headquarters"]
        sync: false
      - name: "Industry"
        role: dimension
        type: VARCHAR(255)
        description: "industry"
        alias: ["industry"]
        sync: false
      - name: "Sales_in_Billion"
        role: dimension
        type: FLOAT
        description: "sales in billion"
        alias: ["sales_in_billion"]
        sync: false
      - name: "Profits_in_Billion"
        role: dimension
        type: FLOAT
        description: "profits in billion"
        alias: ["profits_in_billion"]
        sync: false
      - name: "Assets_in_Billion"
        role: dimension
        type: FLOAT
        description: "assets in billion"
        alias: ["assets_in_billion"]
        sync: false
      - name: "Market_Value_in_Billion"
        role: dimension
        type: FLOAT
        description: "market value in billion"
        alias: ["market_value_in_billion"]
        sync: false
  - name: "employment"
    role: dim
    description: "employment"
    columns:
      - name: "Company_ID"
        role: foreign_key
        type: FLOAT
        description: "company id"
        alias: ["company_id"]
        sync: true
      - name: "People_ID"
        role: foreign_key
        type: FLOAT
        description: "people id"
        alias: ["people_id"]
        sync: false
      - name: "Year_working"
        role: measure
        type: FLOAT
        description: "year working"
        alias: ["year_working"]
        sync: false

metrics:
  - name: "employment_year_working"
    description: year working from employment
    relevant_columns:
      - employment.Year_working
    alias: [year_working]