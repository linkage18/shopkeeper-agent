    role: dim
    description: "job history"
    columns:
      - name: "EMPLOYEE_ID"
        role: foreign_key
        type: FLOAT
        description: "employee id"
        alias: ["employee_id"]
        sync: false
      - name: "START_DATE"
        role: dimension
        type: DATETIME
