      - name: "MANAGER_ID"
        role: foreign_key
        type: FLOAT
        description: "manager id"
        alias: ["manager_id"]
        sync: false
      - name: "DEPARTMENT_ID"
        role: foreign_key
        type: FLOAT
        description: "department id"
        alias: ["department_id"]
        sync: false
