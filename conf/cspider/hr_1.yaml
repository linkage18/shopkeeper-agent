      - name: "JOB_ID"
        role: primary_key
        type: VARCHAR(255)
        description: "job id"
        alias: ["job_id"]
        sync: false
      - name: "JOB_TITLE"
        role: dimension
        type: VARCHAR(255)
        description: "job title"
        alias: ["job_title"]
        sync: false
      - name: "MIN_SALARY"
        role: measure
        type: FLOAT
        description: "min salary"
        alias: ["min_salary"]
        sync: false
      - name: "MAX_SALARY"
        role: measure
        type: FLOAT
        description: "max salary"
