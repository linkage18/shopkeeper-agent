tables:
  - name: "regions"
    role: dim
    description: "regions"
    columns:
      - name: "REGION_ID"
        role: foreign_key
        type: FLOAT
        description: "region id"
        alias: ["region_id"]
        sync: false
      - name: "REGION_NAME"
        role: dimension
        type: VARCHAR(255)
        description: "region name"
        alias: ["region_name"]
        sync: true
  - name: "countries"
    role: dim
    description: "countries"
    columns:
      - name: "COUNTRY_ID"
        role: foreign_key
        type: VARCHAR(255)
        description: "country id"
        alias: ["country_id"]
        sync: true
      - name: "COUNTRY_NAME"
        role: dimension
        type: VARCHAR(255)
        description: "country name"
        alias: ["country_name"]
        sync: true
      - name: "REGION_ID"
        role: foreign_key
        type: FLOAT
        description: "region id"
        alias: ["region_id"]
        sync: false
  - name: "departments"
    role: dim
    description: "departments"
    columns:
      - name: "DEPARTMENT_ID"
        role: foreign_key
        type: FLOAT
        description: "department id"
