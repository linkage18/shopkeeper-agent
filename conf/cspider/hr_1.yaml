        alias: ["department_name"]
        sync: true
      - name: "MANAGER_ID"
        role: foreign_key
        type: FLOAT
        description: "manager id"
        alias: ["manager_id"]
        sync: false
      - name: "LOCATION_ID"
        role: foreign_key
        type: FLOAT
        description: "location id"
        alias: ["location_id"]
        sync: false
  - name: "jobs"
    role: dim
    description: "jobs"
