      - name: "STATE_PROVINCE"
        role: dimension
        type: VARCHAR(255)
        description: "state province"
        alias: ["state_province"]
        sync: true
      - name: "COUNTRY_ID"
        role: foreign_key
        type: VARCHAR(255)
        description: "country id"
        alias: ["country_id"]
        sync: true

metrics:
  - name: "jobs_min_salary"
    description: min salary from jobs
    relevant_columns:
      - jobs.MIN_SALARY
    alias: [min_salary]
  - name: "jobs_max_salary"
    description: max salary from jobs
    relevant_columns:
      - jobs.MAX_SALARY
    alias: [max_salary]
  - name: "employees_salary"
    description: salary from employees
    relevant_columns:
      - employees.SALARY
    alias: [salary]