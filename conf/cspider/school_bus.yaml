        sync: false
  - name: "school"
    role: dim
    description: "school"
    columns:
      - name: "School_ID"
        role: foreign_key
        type: FLOAT
        description: "school id"
        alias: ["school_id"]
        sync: false
      - name: "Grade"
        role: dimension
        type: VARCHAR(255)
        description: "grade"
