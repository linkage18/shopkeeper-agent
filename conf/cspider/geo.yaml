metrics:
  - name: "state_population"
    description: population from state
    relevant_columns:
      - state.population
    alias: [population]
  - name: "state_area"
    description: area from state
    relevant_columns:
      - state.area
    alias: [area]
  - name: "city_population"
    description: population from city
    relevant_columns:
      - city.population
    alias: [population]
  - name: "lake_area"
    description: area from lake
    relevant_columns:
      - lake.area
    alias: [area]