tables:
  - name: "event"
    role: dim
    description: "event"
    columns:
      - name: "Event_ID"
        role: foreign_key
        type: FLOAT
        description: "event id"
        alias: ["event_id"]
        sync: false
      - name: "Date"
        role: dimension
        type: VARCHAR(255)
        description: "date"
        alias: ["date"]
        sync: false
      - name: "Venue"
        role: dimension
        type: VARCHAR(255)
        description: "venue"
        alias: ["venue"]
        sync: false
      - name: "Name"
        role: dimension
        type: VARCHAR(255)
        description: "name"
        alias: ["name"]
        sync: true
      - name: "Event_Attendance"
        role: dimension
        type: FLOAT
        description: "event attendance"
        alias: ["event_attendance"]
        sync: false
  - name: "journalist"
    role: dim
    description: "journalist"
    columns:
      - name: "journalist_ID"
        role: foreign_key
        type: FLOAT
        description: "journalist id"
        alias: ["journalist_id"]
        sync: false
      - name: "Name"
        role: dimension
        type: VARCHAR(255)
        description: "name"
        alias: ["name"]
        sync: true
      - name: "Nationality"
        role: dimension
        type: VARCHAR(255)
        description: "nationality"
        alias: ["nationality"]
        sync: false
      - name: "Age"
        role: dimension
        type: VARCHAR(255)
        description: "age"
        alias: ["age"]
        sync: false
      - name: "Years_working"
        role: measure
        type: FLOAT
        description: "years working"
        alias: ["years_working"]
        sync: false
  - name: "news_report"
    role: dim
    description: "news report"
    columns:
      - name: "journalist_ID"
        role: foreign_key
        type: FLOAT
        description: "journalist id"
        alias: ["journalist_id"]
        sync: false
      - name: "Event_ID"
        role: foreign_key
        type: FLOAT
        description: "event id"
        alias: ["event_id"]
        sync: false
      - name: "Work_Type"
        role: dimension
        type: VARCHAR(255)
        description: "work type"
        alias: ["work_type"]
        sync: true

metrics:
  - name: "journalist_years_working"
    description: years working from journalist
    relevant_columns:
      - journalist.Years_working
    alias: [years_working]