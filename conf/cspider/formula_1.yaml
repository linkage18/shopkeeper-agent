metrics:
  - name: "races_year"
    description: year from races
    relevant_columns:
      - races.year
    alias: [year]
  - name: "drivers_number"
    description: number from drivers
    relevant_columns:
      - drivers.number
    alias: [number]
  - name: "seasons_year"
    description: year from seasons
    relevant_columns:
      - seasons.year
    alias: [year]
  - name: "results_number"
    description: number from results
    relevant_columns:
      - results.number
    alias: [number]
  - name: "results_milliseconds"
    description: milliseconds from results
    relevant_columns:
      - results.milliseconds
    alias: [milliseconds]
  - name: "qualifying_number"
    description: number from qualifying
    relevant_columns:
      - qualifying.number
    alias: [number]
  - name: "pitstops_milliseconds"
    description: milliseconds from pitstops
    relevant_columns:
      - pitStops.milliseconds
    alias: [milliseconds]
  - name: "laptimes_milliseconds"
    description: milliseconds from laptimes
    relevant_columns:
      - lapTimes.milliseconds
    alias: [milliseconds]