  - name: "Vehicles"
    role: dim
    description: "vehicles"
    columns:
      - name: "vehicle_id"
        role: foreign_key
        type: FLOAT
        description: "vehicle id"
        alias: ["vehicle_id"]
        sync: false
      - name: "vehicle_details"
        role: dimension
        type: VARCHAR(255)
        description: "vehicle details"
        alias: ["vehicle_details"]
        sync: false
  - name: "Customers"
    role: dim
    description: "customers"
    columns:
      - name: "customer_id"
        role: foreign_key
        type: FLOAT
        description: "customer id"
        alias: ["customer_id"]
        sync: false
      - name: "customer_address_id"
        role: foreign_key
        type: FLOAT
        description: "customer address id"
        alias: ["customer_address_id"]
        sync: false
      - name: "customer_status_code"
        role: dimension
        type: VARCHAR(255)
        description: "customer status code"
        alias: ["customer_status_code"]
