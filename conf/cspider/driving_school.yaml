      - name: "first_name"
        role: dimension
        type: VARCHAR(255)
        description: "first name"
        alias: ["first_name"]
        sync: true
      - name: "last_name"
        role: dimension
        type: VARCHAR(255)
        description: "last name"
        alias: ["last_name"]
        sync: true
      - name: "amount_outstanding"
        role: measure
        type: FLOAT
        description: "amount outstanding"
        alias: ["amount_outstanding"]
        sync: false
      - name: "email_address"
        role: dimension
        type: VARCHAR(255)
        description: "email address"
        alias: ["email_address"]
        sync: false
      - name: "phone_number"
        role: dimension
