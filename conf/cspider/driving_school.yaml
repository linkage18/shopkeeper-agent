        description: "nickname"
        alias: ["nickname"]
        sync: true
      - name: "first_name"
        role: dimension
        type: VARCHAR(255)
        description: "first name"
        alias: ["first_name"]
        sync: true
      - name: "middle_name"
        role: dimension
        type: VARCHAR(255)
        description: "middle name"
        alias: ["middle_name"]
        sync: true
      - name: "last_name"
        role: dimension
        type: VARCHAR(255)
        description: "last name"
        alias: ["last_name"]
        sync: true
      - name: "date_of_birth"
        role: dimension
        type: DATETIME
        description: "date of birth"
        alias: ["date_of_birth"]
        sync: false
      - name: "date_joined_staff"
        role: dimension
        type: DATETIME
        description: "date joined staff"
        alias: ["date_joined_staff"]
        sync: false
      - name: "date_left_staff"
        role: dimension
        type: DATETIME
