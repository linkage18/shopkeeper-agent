tables:
  - name: "Addresses"
    role: dim
    description: "addresses"
    columns:
      - name: "address_id"
        role: foreign_key
        type: FLOAT
        description: "address id"
        alias: ["address_id"]
        sync: false
      - name: "line_1_number_building"
        role: dimension
        type: VARCHAR(255)
        description: "line 1 number building"
        alias: ["line_1_number_building"]
        sync: false
      - name: "city"
        role: dimension
        type: VARCHAR(255)
        description: "city"
        alias: ["city"]
        sync: true
      - name: "zip_postcode"
        role: dimension
        type: VARCHAR(255)
        description: "zip postcode"
        alias: ["zip_postcode"]
        sync: true
      - name: "state_province_county"
        role: dimension
        type: VARCHAR(255)
        description: "state province county"
        alias: ["state_province_county"]
        sync: true
      - name: "country"
        role: dimension
        type: VARCHAR(255)
        description: "country"
        alias: ["country"]
        sync: true
  - name: "Staff"
