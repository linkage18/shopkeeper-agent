      - name: "cell_mobile_phone_number"
        role: dimension
        type: VARCHAR(255)
        description: "cell mobile phone number"
        alias: ["cell_mobile_phone_number"]
        sync: false
  - name: "Customer_Payments"
    role: fact
    description: "customer payments"
    columns:
      - name: "customer_id"
        role: foreign_key
        type: FLOAT
        description: "customer id"
        alias: ["customer_id"]
        sync: false
      - name: "datetime_payment"
        role: dimension
        type: DATETIME
        description: "datetime payment"
        alias: ["datetime_payment"]
        sync: false
      - name: "payment_method_code"
        role: dimension
        type: VARCHAR(255)
        description: "payment method code"
        alias: ["payment_method_code"]
        sync: true
      - name: "amount_payment"
        role: measure
        type: FLOAT
        description: "amount payment"
        alias: ["amount_payment"]
        sync: false
  - name: "Lessons"
    role: dim
    description: "lessons"
    columns:
      - name: "lesson_id"
        role: foreign_key
        type: FLOAT
        description: "lesson id"
        alias: ["lesson_id"]
        sync: false
      - name: "customer_id"
        role: foreign_key
        type: FLOAT
        description: "customer id"
        alias: ["customer_id"]
        sync: false
      - name: "lesson_status_code"
        role: dimension
        type: VARCHAR(255)
        description: "lesson status code"
        alias: ["lesson_status_code"]
        sync: true
      - name: "staff_id"
        role: foreign_key
        type: FLOAT
        description: "staff id"
        alias: ["staff_id"]
        sync: false
      - name: "vehicle_id"
        role: foreign_key
        type: FLOAT
        description: "vehicle id"
        alias: ["vehicle_id"]
        sync: false
      - name: "lesson_date"
        role: dimension
        type: DATETIME
        description: "lesson date"
        alias: ["lesson_date"]
        sync: false
      - name: "lesson_time"
        role: dimension
        type: VARCHAR(255)
        description: "lesson time"
        alias: ["lesson_time"]
        sync: false
      - name: "price"
        role: measure
        type: FLOAT
        description: "price"
        alias: ["price"]
        sync: false

metrics:
  - name: "customers_amount_outstanding"
    description: amount outstanding from customers
    relevant_columns:
      - Customers.amount_outstanding
    alias: [amount_outstanding]
  - name: "customer_payments_amount_payment"
    description: amount payment from customer_payments
    relevant_columns:
      - Customer_Payments.amount_payment
    alias: [amount_payment]
  - name: "lessons_price"
    description: price from lessons
    relevant_columns:
      - Lessons.price
    alias: [price]