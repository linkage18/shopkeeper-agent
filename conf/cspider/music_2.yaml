    role: dim
    description: "songs"
    columns:
      - name: "SongId"
        role: primary_key
        type: FLOAT
        description: "songid"
        alias: ["songid"]
        sync: false
      - name: "Title"
        role: dimension
        type: VARCHAR(255)
        description: "title"
        alias: ["title"]
        sync: false
