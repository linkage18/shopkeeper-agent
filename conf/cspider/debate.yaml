tables:
  - name: "people"
    role: dim
    description: "people"
    columns:
      - name: "People_ID"
        role: foreign_key
        type: FLOAT
        description: "people id"
        alias: ["people_id"]
        sync: false
      - name: "District"
        role: dimension
        type: VARCHAR(255)
        description: "district"
        alias: ["district"]
        sync: false
      - name: "Name"
        role: dimension
        type: VARCHAR(255)
        description: "name"
        alias: ["name"]
        sync: true
      - name: "Party"
        role: dimension
        type: VARCHAR(255)
        description: "party"
        alias: ["party"]
        sync: false
      - name: "Age"
        role: dimension
        type: FLOAT
        description: "age"
        alias: ["age"]
        sync: false
  - name: "debate"
    role: dim
    description: "debate"
    columns:
      - name: "Debate_ID"
        role: foreign_key
        type: FLOAT
        description: "debate id"
        alias: ["debate_id"]
        sync: false
      - name: "Date"
        role: dimension
        type: VARCHAR(255)
        description: "date"
        alias: ["date"]
        sync: false
      - name: "Venue"
        role: dimension
        type: VARCHAR(255)
        description: "venue"
        alias: ["venue"]
        sync: false
      - name: "Num_of_Audience"
        role: dimension
        type: FLOAT
        description: "num of audience"
        alias: ["num_of_audience"]
        sync: false
  - name: "debate_people"
    role: dim
    description: "debate people"
    columns:
      - name: "Debate_ID"
        role: foreign_key
        type: FLOAT
        description: "debate id"
        alias: ["debate_id"]
        sync: false
      - name: "Affirmative"
        role: dimension
        type: FLOAT
        description: "affirmative"
        alias: ["affirmative"]
        sync: false
      - name: "Negative"
        role: dimension
        type: FLOAT
        description: "negative"
        alias: ["negative"]
        sync: false
      - name: "If_Affirmative_Win"
        role: dimension
        type: VARCHAR(255)
        description: "if affirmative win"
        alias: ["if_affirmative_win"]
        sync: false