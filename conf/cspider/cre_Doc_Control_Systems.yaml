    role: dim
    description: "ref document types"
    columns:
      - name: "document_type_code"
        role: dimension
        type: VARCHAR(255)
        description: "document type code"
        alias: ["document_type_code"]
        sync: true
      - name: "document_type_description"
        role: dimension
        type: VARCHAR(255)
        description: "document type description"
        alias: ["document_type_description"]
        sync: true
  - name: "Roles"
    role: dim
