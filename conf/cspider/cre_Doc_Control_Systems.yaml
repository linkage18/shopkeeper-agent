        sync: false

metrics:
  - name: "document_drafts_draft_number"
    description: draft number from document_drafts
    relevant_columns:
      - Document_Drafts.draft_number
    alias: [draft_number]
  - name: "draft_copies_draft_number"
    description: draft number from draft_copies
    relevant_columns:
      - Draft_Copies.draft_number
    alias: [draft_number]
  - name: "draft_copies_copy_number"
    description: copy number from draft_copies
    relevant_columns:
      - Draft_Copies.copy_number
    alias: [copy_number]
  - name: "circulation_history_draft_number"
    description: draft number from circulation_history
    relevant_columns:
      - Circulation_History.draft_number
    alias: [draft_number]
  - name: "circulation_history_copy_number"
    description: copy number from circulation_history
    relevant_columns:
      - Circulation_History.copy_number
    alias: [copy_number]