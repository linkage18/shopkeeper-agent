metrics:
  - name: "products_product_price"
    description: product price from products
    relevant_columns:
      - Products.product_price
    alias: [product_price]
  - name: "product_suppliers_total_value_purchased"
    description: total value purchased from product_suppliers
    relevant_columns:
      - Product_Suppliers.total_value_purchased
    alias: [total_value_purchased]