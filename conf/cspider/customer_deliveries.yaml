    role: dim
    description: "products"
    columns:
      - name: "product_id"
        role: foreign_key
        type: FLOAT
        description: "product id"
        alias: ["product_id"]
        sync: false
      - name: "product_name"
        role: dimension
        type: VARCHAR(255)
        description: "product name"
        alias: ["product_name"]
        sync: true
      - name: "product_price"
        role: measure
        type: FLOAT
        description: "product price"
        alias: ["product_price"]
        sync: false
